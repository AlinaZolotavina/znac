name: Frontend CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    env:
      CI: true
      REACT_APP_API_URL: /api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false

      - name: Build
        run: npm run build

  trigger-deploy:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Trigger production deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.ZNAC_PROJECT_DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/AlinaZolotavina/znac-project/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
